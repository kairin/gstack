name: Periodic Evals
on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6 AM UTC
  workflow_dispatch:

concurrency:
  group: evals-periodic
  cancel-in-progress: true

env:
  EVALS_TIER: periodic
  EVALS_ALL: 1  # Ignore diff — run all periodic tests
  PLAYWRIGHT_HOST_PLATFORM_OVERRIDE: ubuntu24.04-x64

jobs:
  evals:
    runs-on: ubicloud-standard-8
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: e2e-plan
            file: test/skill-e2e-plan.test.ts
          - name: e2e-design
            file: test/skill-e2e-design.test.ts
          - name: e2e-qa-bugs
            file: test/skill-e2e-qa-bugs.test.ts
          - name: e2e-qa-workflow
            file: test/skill-e2e-qa-workflow.test.ts
          - name: e2e-review
            file: test/skill-e2e-review.test.ts
          - name: e2e-workflow
            file: test/skill-e2e-workflow.test.ts
          - name: e2e-routing
            file: test/skill-routing-e2e.test.ts
          - name: e2e-codex
            file: test/codex-e2e.test.ts
          - name: e2e-gemini
            file: test/gemini-e2e.test.ts
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Configure writable temp dirs
        run: |
          mkdir -p "$HOME/.cache/bun" "$HOME/.cache/tmp"
          {
            echo "BUN_INSTALL_CACHE_DIR=$HOME/.cache/bun"
            echo "BUN_TMPDIR=$HOME/.cache/bun"
            echo "TMPDIR=$HOME/.cache/tmp"
          } >> "$GITHUB_ENV"

      - name: Install native Linux packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl unzip xz-utils ca-certificates jq bc gpg \
            fonts-liberation fonts-noto-color-emoji fontconfig xvfb x11-utils
          fc-cache -f

      - name: Install GitHub CLI
        run: |
          if command -v gh >/dev/null 2>&1; then
            gh --version
            exit 0
          fi
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gh

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium and system deps
        run: bunx playwright install --with-deps chromium

      - name: Build
        run: bun run build

      - name: Run ${{ matrix.suite.name }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVALS_CONCURRENCY: "40"
        run: EVALS=1 bun test --retry 2 --concurrent --max-concurrency 40 ${{ matrix.suite.file }}

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-periodic-${{ matrix.suite.name }}
          path: ~/.gstack-dev/evals/*.json
          retention-days: 90
